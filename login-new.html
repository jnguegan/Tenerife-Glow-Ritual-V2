<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión | Tenerife Glow Ritual</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --sand: #F5F0E8; --sand-mid: #EDE5D6; --sand-deep: #D6C9B0;
      --stone: #8C7B6B; --stone-dark: #5C4D3E; --obsidian: #1E1A16;
      --gold: #C9A96E; --gold-light: #E8D5A8; --ivory: #FAF7F2; --white: #FFFFFF;
      --radius: 2px; --radius-lg: 6px;
    }
    body { font-family: 'DM Sans', sans-serif; font-weight: 300; background: var(--ivory); color: var(--obsidian); line-height: 1.6; min-height: 100vh; }
    
    .topbar { position: sticky; top: 0; z-index: 100; background: rgba(250,247,242,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid var(--sand-deep); padding: 0 3rem; display: flex; align-items: center; justify-content: space-between; height: 70px; }
    .brand-wrap { display: flex; align-items: center; gap: 14px; }
    .brand-mark { width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0; background: linear-gradient(135deg, var(--gold) 0%, var(--sand-deep) 100%); }
    .eyebrow { font-size: 10px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--stone); }
    .brand-title { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 400; color: var(--obsidian); }
    
    .auth-layout { display: grid; grid-template-columns: 1fr 1fr; min-height: calc(100vh - 70px); }
    .auth-left { background: var(--sand); padding: 5rem 4rem; display: flex; flex-direction: column; justify-content: center; }
    .auth-left h2 { font-family: 'Playfair Display', serif; font-size: 2.2rem; font-weight: 400; color: var(--obsidian); margin-bottom: 1rem; line-height: 1.2; }
    .auth-left p { font-size: 14px; color: var(--stone-dark); line-height: 1.7; max-width: 380px; }
    
    .auth-right { background: var(--white); padding: 5rem 4rem; display: flex; flex-direction: column; justify-content: center; }
    .auth-form-wrap { max-width: 400px; width: 100%; }
    .auth-form-wrap h3 { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 400; color: var(--obsidian); margin-bottom: 2rem; }
    
    .field-group { margin-bottom: 1.25rem; }
    .field-label { display: block; font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--stone-dark); margin-bottom: 8px; }
    .styled-input { width: 100%; height: 50px; padding: 0 18px; border: 1px solid var(--sand-deep); border-radius: var(--radius); background: var(--ivory); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 300; color: var(--obsidian); outline: none; transition: border-color 0.2s; }
    .styled-input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,169,110,0.12); background: var(--white); }
    
    .login-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.75rem; }
    .remember-row { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--stone-dark); }
    .remember-row input { width: 16px; height: 16px; accent-color: var(--gold); }
    .forgot-link { font-size: 13px; color: var(--stone-dark); text-decoration: underline; cursor: pointer; }
    .forgot-link:hover { color: var(--gold); }
    
    .btn-group { display: flex; flex-direction: column; gap: 10px; }
    .btn { display: flex; align-items: center; justify-content: center; text-decoration: none; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; letter-spacing: 0.06em; height: 50px; padding: 0 28px; border-radius: var(--radius); transition: all 0.25s; cursor: pointer; border: none; width: 100%; }
    .btn-primary { background: var(--obsidian); color: var(--ivory); }
    .btn-primary:hover { background: var(--stone-dark); }
    .btn-secondary { background: transparent; color: var(--obsidian); border: 1px solid var(--sand-deep); }
    .btn-secondary:hover { background: var(--sand); }
    
    .form-footer { margin-top: 1.5rem; font-size: 12px; color: var(--stone); text-align: center; }
    .form-footer a { color: var(--stone-dark); text-decoration: underline; }
    
    .error-message { background: #fee; border: 1px solid #fcc; color: #900; padding: 12px 16px; margin-bottom: 1rem; font-size: 13px; border-radius: var(--radius); display: none; }
    .error-message.show { display: block; }
    
    @media (max-width: 900px) { .auth-layout { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand-wrap">
      <div class="brand-mark"></div>
      <div>
        <p class="eyebrow">Ritual de Piel de la Isla</p>
        <h1 class="brand-title">Tenerife Glow Ritual</h1>
      </div>
    </div>
  </header>

  <div class="auth-layout">
    <div class="auth-left">
      <div>
        <h2>Vuelve a tu ritual</h2>
        <p>Continúa donde lo dejaste. Tu progreso, tu racha y tu comunidad te esperan.</p>
      </div>
    </div>

    <div class="auth-right">
      <div class="auth-form-wrap">
        <h3>Iniciar sesión</h3>

        <div class="error-message" id="errorMessage"></div>

        <form id="loginForm">
          <div class="field-group">
            <label class="field-label" for="email">Correo electrónico</label>
            <input id="email" name="email" class="styled-input" type="email" placeholder="tu@email.com" required />
          </div>

          <div class="field-group">
            <label class="field-label" for="password">Contraseña</label>
            <input id="password" name="password" class="styled-input" type="password" placeholder="Tu contraseña" required />
          </div>

          <div class="login-row">
            <label class="remember-row">
              <input type="checkbox" />
              <span>Recordarme</span>
            </label>
            <a class="forgot-link" id="forgotLink">¿Olvidaste tu contraseña?</a>
          </div>

          <div class="btn-group">
            <button type="submit" class="btn btn-primary">Iniciar sesión</button>
            <a href="signup-new.html" class="btn btn-secondary">Crear cuenta nueva</a>
          </div>

          <p class="form-footer">¿No tienes cuenta? <a href="signup-new.html">Crea una aquí</a></p>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script src="auth-new.js"></script>

  <script>
  document.addEventListener("DOMContentLoaded", function() {
    const form = document.getElementById("loginForm");
    const errorDiv = document.getElementById("errorMessage");
    const forgotLink = document.getElementById("forgotLink");

    // Check if already logged in
    window.supabaseClient.auth.getSession().then(({ data: { session } }) => {
      if (session) {
        window.location.href = "dashboard-new.html";
      }
    });

    form.addEventListener("submit", async function(e) {
      e.preventDefault();
      errorDiv.classList.remove("show");

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      const btn = form.querySelector("button[type='submit']");
      btn.disabled = true;
      btn.textContent = "Conectando...";

      const result = await window.tgrNew.logInNew(email, password);

      if (!result.ok) {
        errorDiv.textContent = "Error: " + result.error;
        errorDiv.classList.add("show");
        btn.disabled = false;
        btn.textContent = "Iniciar sesión";
      } else {
        window.location.href = "dashboard-new.html";
      }
    });

    forgotLink.addEventListener("click", function(e) {
      e.preventDefault();
      const email = document.getElementById("email").value.trim();
      if (!email) {
        alert("Por favor ingresa tu correo electrónico primero.");
        return;
      }
      alert("Funcionalidad de reseteo de contraseña disponible próximamente.");
    });
  });
  </script>
</body>
</html>
